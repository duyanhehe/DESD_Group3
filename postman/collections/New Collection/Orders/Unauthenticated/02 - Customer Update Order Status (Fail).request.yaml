$kind: http-request
name: Customer Update Order Status (Fail)
method: PUT
url: "{{base_url}}/orders/api/v1/{{order_id}}/status/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
body:
  type: json
  content: |-
    {
      "status": "confirmed"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 403 — only producers can update status", function () {
          pm.response.to.have.status(403);
      });

      pm.test("Error mentions producer", function () {
          var data = pm.response.json();
          pm.expect(data.error).to.include("producer");
      });
    language: text/javascript
