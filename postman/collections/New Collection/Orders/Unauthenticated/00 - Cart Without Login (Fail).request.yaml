$kind: http-request
name: Cart Without Login (Fail)
method: GET
url: "{{base_url}}/orders/api/v1/cart/"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 401 or 403 — must be logged in", function () {
          pm.expect(pm.response.code).to.be.oneOf([401, 403]);
      });
    language: text/javascript
