$kind: http-request
name: Customer Access Producer Orders (Fail)
method: GET
url: "{{base_url}}/orders/api/v1/producer/"
headers:
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 403 — customer blocked from producer endpoint", function () {
          pm.response.to.have.status(403);
      });

      pm.test("Error mentions producer role", function () {
          var data = pm.response.json();
          pm.expect(data.error).to.include("producer");
      });
    language: text/javascript
