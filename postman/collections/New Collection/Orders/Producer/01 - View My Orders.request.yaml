$kind: http-request
name: View My Orders (DESD-66)
method: GET
url: "{{base_url}}/orders/api/v1/producer/"
headers:
  Authorization: "Token {{producer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Returns orders with my products (DESD-66)", function () {
          var data = pm.response.json();
          pm.expect(data).to.be.an("array");
          pm.expect(data.length).to.be.at.least(1);
      });

      pm.test("Only my items shown (DESD-67)", function () {
          var data = pm.response.json();
          data.forEach(function(order) {
              pm.expect(order).to.have.property("my_items");
              pm.expect(order.my_items.length).to.be.at.least(1);
              pm.expect(order).to.have.property("my_subtotal");
          });
      });

      pm.test("Customer contact info present (DESD-68)", function () {
          var order = pm.response.json()[0];
          pm.expect(order).to.have.property("customer_name");
          pm.expect(order).to.have.property("customer_email");
          pm.expect(order).to.have.property("customer_phone");
          pm.expect(order).to.have.property("delivery_address");
          pm.expect(order).to.have.property("customer_postcode");
          pm.expect(order.customer_name).to.not.be.empty;
      });
    language: text/javascript
