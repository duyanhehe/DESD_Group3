$kind: http-request
name: Confirmed to Ready (DESD-71)
method: PUT
url: "{{base_url}}/orders/api/v1/{{order_id}}/status/"
headers:
  Content-Type: application/json
  Authorization: "Token {{producer_token}}"
body:
  type: json
  content: |-
    {
      "status": "ready",
      "note": "Packed and ready for pickup"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Status is ready", function () {
          var data = pm.response.json();
          pm.expect(data.status).to.eql("ready");
      });

      pm.test("Audit log has 3 entries", function () {
          var data = pm.response.json();
          pm.expect(data.status_logs.length).to.eql(3);
      });
    language: text/javascript
