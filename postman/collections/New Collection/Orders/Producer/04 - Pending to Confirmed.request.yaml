$kind: http-request
name: Pending to Confirmed (DESD-71)
method: PUT
url: "{{base_url}}/orders/api/v1/{{order_id}}/status/"
headers:
  Content-Type: application/json
  Authorization: "Token {{producer_token}}"
body:
  type: json
  content: |-
    {
      "status": "confirmed",
      "note": "Stock checked, good to go"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Status is confirmed", function () {
          var data = pm.response.json();
          pm.expect(data.status).to.eql("confirmed");
      });

      pm.test("Audit log has 2 entries (DESD-73)", function () {
          var data = pm.response.json();
          pm.expect(data.status_logs.length).to.eql(2);
          var last = data.status_logs[data.status_logs.length - 1];
          pm.expect(last.old_status).to.eql("pending");
          pm.expect(last.new_status).to.eql("confirmed");
      });
    language: text/javascript
