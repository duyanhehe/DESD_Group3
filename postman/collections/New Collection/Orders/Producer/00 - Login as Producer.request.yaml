$kind: http-request
name: Login as Producer
method: POST
url: "{{base_url}}/accounts/api/v1/login/"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "farmer1",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Got token, role is producer", function () {
          var data = pm.response.json();
          pm.expect(data).to.have.property("token");
          pm.expect(data.role).to.eql("producer");
      });

      var data = pm.response.json();
      if (data.token) {
          pm.environment.set("producer_token", data.token);
      }
    language: text/javascript
