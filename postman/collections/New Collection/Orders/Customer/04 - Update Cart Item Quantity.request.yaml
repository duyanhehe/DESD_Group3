$kind: http-request
name: Update Cart Item Quantity
method: PUT
url: "{{base_url}}/orders/api/v1/cart/item/{{cart_item_id}}/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
body:
  type: json
  content: |-
    {
      "quantity": 5
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Quantity updated (DESD-56)", function () {
          var data = pm.response.json();
          var item = data.items.find(i => i.id == pm.environment.get("cart_item_id"));
          if (item) pm.expect(item.quantity).to.eql(5);
      });

      pm.test("Total recalculated (DESD-57)", function () {
          var data = pm.response.json();
          pm.expect(parseFloat(data.total)).to.be.above(0);
      });
    language: text/javascript
