$kind: http-request
name: View Status History (DESD-73)
method: GET
url: "{{base_url}}/orders/api/v1/{{order_id}}/history/"
headers:
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Audit trail returned", function () {
          var data = pm.response.json();
          pm.expect(data).to.be.an("array");
          pm.expect(data.length).to.be.at.least(1);
      });

      pm.test("Each entry has required fields", function () {
          var data = pm.response.json();
          data.forEach(function(log) {
              pm.expect(log).to.have.property("old_status");
              pm.expect(log).to.have.property("new_status");
              pm.expect(log).to.have.property("changed_by_name");
              pm.expect(log).to.have.property("timestamp");
              pm.expect(log).to.have.property("note");
          });
      });
    language: text/javascript
