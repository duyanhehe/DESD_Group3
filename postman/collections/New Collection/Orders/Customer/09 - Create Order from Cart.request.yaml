$kind: http-request
name: Create Order from Cart
method: POST
url: "{{base_url}}/orders/api/v1/create/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 201", function () {
          pm.response.to.have.status(201);
      });

      pm.test("Order created with pending status", function () {
          var data = pm.response.json();
          pm.expect(data).to.have.property("id");
          pm.expect(data.status).to.eql("pending");
          pm.expect(parseFloat(data.total_price)).to.be.above(0);
      });

      pm.test("Order has items", function () {
          var data = pm.response.json();
          pm.expect(data.items.length).to.be.at.least(1);
          data.items.forEach(function(item) {
              pm.expect(item).to.have.property("product_name");
              pm.expect(item).to.have.property("producer_name");
          });
      });

      pm.test("Initial audit log entry (DESD-73)", function () {
          var data = pm.response.json();
          pm.expect(data.status_logs.length).to.eql(1);
          pm.expect(data.status_logs[0].new_status).to.eql("pending");
          pm.expect(data.status_logs[0].note).to.eql("Order placed");
      });

      var data = pm.response.json();
      if (data.id) {
          pm.environment.set("order_id", data.id);
      }
    language: text/javascript
