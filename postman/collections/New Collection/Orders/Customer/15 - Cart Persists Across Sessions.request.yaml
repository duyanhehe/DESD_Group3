$kind: http-request
name: Cart Persists Across Sessions (DESD-55)
method: POST
url: "{{base_url}}/orders/api/v1/cart/add/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
body:
  type: json
  content: |-
    {
      "product_id": 9,
      "quantity": 2
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Same cart ID — persistent (DESD-55)", function () {
          var data = pm.response.json();
          pm.expect(data.id).to.be.a("number");
      });
    language: text/javascript
