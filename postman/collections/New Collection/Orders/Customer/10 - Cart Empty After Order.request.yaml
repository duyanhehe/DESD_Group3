$kind: http-request
name: Cart Empty After Order
method: GET
url: "{{base_url}}/orders/api/v1/cart/"
headers:
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Cart cleared after checkout", function () {
          var data = pm.response.json();
          pm.expect(data.items.length).to.eql(0);
          pm.expect(parseFloat(data.total)).to.eql(0);
      });
    language: text/javascript
