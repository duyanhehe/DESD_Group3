$kind: http-request
name: View Cart (Empty)
method: GET
url: "{{base_url}}/orders/api/v1/cart/"
headers:
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Cart auto-created with empty items (DESD-55)", function () {
          var data = pm.response.json();
          pm.expect(data).to.have.property("id");
          pm.expect(data).to.have.property("items");
          pm.expect(data).to.have.property("total");
          pm.expect(data).to.have.property("grouped_by_producer");
          pm.expect(data.items).to.be.an("array");
      });
    language: text/javascript
