$kind: http-request
name: Order from Empty Cart (Fail)
method: POST
url: "{{base_url}}/orders/api/v1/create/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 400 — empty cart", function () {
          pm.response.to.have.status(400);
      });

      pm.test("Error says cart empty", function () {
          var data = pm.response.json();
          pm.expect(data.error).to.include("empty");
      });
    language: text/javascript
