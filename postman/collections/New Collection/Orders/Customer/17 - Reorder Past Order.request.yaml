$kind: http-request
name: Reorder Past Order
method: POST
url: "{{base_url}}/orders/api/v1/{{order_id}}/reorder/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Returns reorder summary", function () {
          var data = pm.response.json();
          pm.expect(data).to.have.property("message");
          pm.expect(data).to.have.property("details");
          pm.expect(data.details).to.have.property("added");
          pm.expect(data.details).to.have.property("partial");
          pm.expect(data.details).to.have.property("unavailable");
      });
    language: text/javascript
