$kind: http-request
name: Create Stripe Checkout Session
method: POST
url: "{{base_url}}/payments/api/v1/checkout/"
headers:
  Content-Type: application/json
  Authorization: "Token {{customer_token}}"
scripts:
  - type: afterResponse
    code: |
      // If cart is empty, it returns 400. If cart has items, 200.
      if (pm.response.code === 200) {
          pm.test("Status 200", function () {
              pm.response.to.have.status(200);
          });
          pm.test("Returns checkout URL", function () {
              var data = pm.response.json();
              pm.expect(data).to.have.property("checkout_url");
              pm.expect(data.checkout_url).to.include("checkout.stripe.com");
          });
      } else {
          pm.test("Status 400 (Cart empty)", function () {
              pm.response.to.have.status(400);
          });
      }
    language: text/javascript
