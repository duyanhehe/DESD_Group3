$kind: http-request
name: 'Register - Invalid'
method: POST
url: '{{base_url}}/api/v1/accounts/register/'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "",
      "password": ""
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400 for invalid data", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response contains validation errors", function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData).to.be.an("object");
      });
