$kind: http-request
name: Login - Success
method: POST
url: "{{base_url}}/api/v1/accounts/login/"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "testcustomer",
      "password": "TestPass123!"
    }
auth:
  type: basic
scripts:
  - type: afterResponse
    code: |
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has message and role", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData).to.have.property("role");
          pm.expect(jsonData.message).to.eql("Login successful");
      });

      pm.test("Role is customer", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.role).to.eql("customer");
      });


      var jsonData = pm.response.json();
      if (pm.response.code === 200 && jsonData.token) {
          pm.environment.set("auth_token", jsonData.token);
          console.log("✅ Token saved:", jsonData.token);
      }
    language: text/javascript
  - type: beforeRequest
    code: "\r\n"
    language: text/javascript
