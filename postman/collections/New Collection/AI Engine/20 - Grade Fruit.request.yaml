$kind: http-request
name: Grade Fruit Image (AI)
method: POST
url: "{{base_url}}/ai/grading/"
headers:
  Content-Type: application/json
  Authorization: Token {{producer_token}}
body:
  type: json
  content: |-
    {
      "image_path": "notebooks/dataset/test_images/tao_hong_1.png"
    }
auth:
  type: bearer
  credentials:
    token: "{{producer_token}}"
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          if (pm.response.code !== 500) {
              pm.response.to.have.status(200);
          }
      });
      pm.test("Returns XAI grade", function () {
          var data = pm.response.json();
          if (data.success) {
              pm.expect(data).to.have.property("grade");
              pm.expect(data).to.have.property("xai");
          }
      });
    language: text/javascript
