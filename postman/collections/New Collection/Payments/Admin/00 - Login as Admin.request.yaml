$kind: http-request
name: Login as Admin
method: POST
url: "{{base_url}}/accounts/api/v1/login/"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "admin",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |
      var data = pm.response.json();
      if (data.token) {
          pm.environment.set("admin_token", data.token);
      }
    language: text/javascript
