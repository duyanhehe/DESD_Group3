$kind: http-request
name: Admin Calculate Settlements
method: POST
url: "{{base_url}}/payments/api/v1/admin/settlements/calculate/"
headers:
  Content-Type: application/json
  Authorization: "Token {{admin_token}}"
body:
  type: json
  content: |-
    {
      "week_start": "2026-04-13",
      "week_end": "2026-04-19"
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
