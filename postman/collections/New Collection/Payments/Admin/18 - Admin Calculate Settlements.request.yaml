$kind: http-request
name: Admin Calculate Settlements
method: POST
url: "{{base_url}}/payments/api/v1/admin/settlements/calculate/"
headers:
  Content-Type: application/json
  Authorization: Token {{admin_token}}
body:
  type: json
  content: |-
    {
      "week_date": "2026-04-24",
      "dry_run": false
    }
scripts:
  - type: afterResponse
    code: |
      pm.test("Status 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
