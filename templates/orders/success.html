{% extends "base.html" %}
{% load static %}

{% block title %}Order Confirmed - Food Network{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto px-6 py-12 lg:py-20">
    <div id="order-success-content">
        <!-- Loading State -->
        <div class="flex flex-col items-center justify-center py-20 text-center space-y-4">
            <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
            <p class="text-on-surface-variant font-bold text-xs uppercase tracking-widest">Finalizing your order details...</p>
        </div>
    </div>

    <!-- Recommendations Section (AI) -->
    <div id="order-recommendations" class="mt-24 pt-24 border-t border-outline-variant/10 hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Loaded via order_success.js -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/order_success.js' %}"></script>
{% endblock %}
