{% extends "base.html" %}
{% load static %}

{% block title %}Search Results - Food Network{% endblock %}

{% block content %}
<div class="max-w-screen-2xl mx-auto px-6 py-12 lg:py-20">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12 border-b border-outline-variant/10 pb-12">
        <div class="max-w-2xl">
            <span class="text-[10px] font-bold text-primary uppercase tracking-[0.2em] mb-3 block">Market Discovery</span>
            <h1 id="search-title" class="font-headline text-4xl lg:text-6xl font-extrabold text-on-background mb-4 tracking-tight leading-[1.1]">
                Search Results
            </h1>
            <p class="text-on-surface-variant text-lg font-medium leading-relaxed">Browsing through the finest harvests from our local network.</p>
        </div>
    </div>
    
    <div id="search-results-content" class="min-h-[400px]">
        <!-- Skeleton Loader -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8 animate-pulse">
            <div class="space-y-4">
                <div class="aspect-square bg-surface-container rounded-[32px]"></div>
                <div class="h-4 bg-surface-container rounded-full w-3/4"></div>
                <div class="h-3 bg-surface-container rounded-full w-1/2"></div>
            </div>
            <div class="space-y-4">
                <div class="aspect-square bg-surface-container rounded-[32px]"></div>
                <div class="h-4 bg-surface-container rounded-full w-3/4"></div>
                <div class="h-3 bg-surface-container rounded-full w-1/2"></div>
            </div>
            <div class="space-y-4">
                <div class="aspect-square bg-surface-container rounded-[32px]"></div>
                <div class="h-4 bg-surface-container rounded-full w-3/4"></div>
                <div class="h-3 bg-surface-container rounded-full w-1/2"></div>
            </div>
            <div class="space-y-4">
                <div class="aspect-square bg-surface-container rounded-[32px]"></div>
                <div class="h-4 bg-surface-container rounded-full w-3/4"></div>
                <div class="h-3 bg-surface-container rounded-full w-1/2"></div>
            </div>
            <div class="space-y-4">
                <div class="aspect-square bg-surface-container rounded-[32px]"></div>
                <div class="h-4 bg-surface-container rounded-full w-3/4"></div>
                <div class="h-3 bg-surface-container rounded-full w-1/2"></div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    const titleEl = document.getElementById('search-title');
    const contentEl = document.getElementById('search-results-content');
    
    if (!query) {
        titleEl.textContent = 'Discover Market';
        contentEl.innerHTML = `
            <div class="flex flex-col items-center justify-center py-24 text-center">
                <span class="material-symbols-outlined text-6xl text-outline-variant mb-6">search_off</span>
                <h3 class="font-headline text-2xl font-bold mb-2">No keywords entered</h3>
                <p class="text-on-surface-variant font-medium mb-8">Type something in the search bar to find local produce.</p>
                <a href="/" class="px-8 py-3 bg-primary text-on-primary rounded-full font-bold shadow-lg shadow-primary/20">Back to Market</a>
            </div>
        `;
        return;
    }
    
    titleEl.innerHTML = `Results for <span class="text-primary italic">"${query}"</span>`;
    
    try {
        const response = await fetch(`/products/api/v1/search/?q=${encodeURIComponent(query)}`);
        if (!response.ok) throw new Error('Search synchronization failed');
        
        const data = await response.json();
        const results = data.results || [];
        
        if (results.length === 0) {
            contentEl.innerHTML = `
                <div class="flex flex-col items-center justify-center py-24 text-center bg-surface-container-low/50 rounded-[48px] border border-dashed border-outline-variant/30">
                    <span class="material-symbols-outlined text-6xl text-outline mb-6">psychiatry</span>
                    <h3 class="font-headline text-24 font-bold mb-2 uppercase tracking-widest text-outline">Empty Harvest</h3>
                    <p class="text-on-surface-variant font-medium max-w-sm">We couldn't find any products matching your search. Try different keywords or browse by category.</p>
                </div>
            `;
            return;
        }

        const categoryIcons = {
            'Fruits': '🍎', 'Vegetables': '🥕', 'Dairy': '🥛', 'Bakery': '🍞',
            'Meat': '🥩', 'Seafood': '🐟', 'Drinks': '🥤', 'None': '🛒'
        };

        const html = `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-8">
                ${results.map(product => {
                    const icon = categoryIcons[product.category_name] || '🌿';
                    const isInStock = product.stock_quantity > 0;
                    
                    return `
                        <div class="group bg-white rounded-[32px] p-4 border border-outline-variant/5 shadow-sm hover:shadow-xl transition-all duration-500 hover:-translate-y-2 cursor-pointer relative overflow-hidden" 
                             onclick="window.location.href='/products/${product.id}/'">
                            
                            <!-- Badges -->
                            <div class="absolute top-6 left-6 z-20 flex flex-col gap-1.5 pointer-events-none">
                                ${product.is_organic ? `
                                <span class="bg-emerald-600 text-white text-[8px] font-black px-2 py-1 rounded-full uppercase tracking-tighter flex items-center gap-1 shadow-sm">
                                    <span class="material-symbols-outlined text-[10px]">verified</span> Organic
                                </span>` : ''}
                                ${product.is_surplus ? `
                                <span class="bg-amber-400 text-amber-950 text-[8px] font-black px-2 py-1 rounded-full uppercase tracking-tighter flex items-center gap-1 shadow-sm">
                                    <span class="material-symbols-outlined text-[10px]">local_fire_department</span> Surplus
                                </span>` : ''}
                            </div>

                            <!-- Large Floating Icon Placeholder -->
                            <div class="aspect-square bg-surface-container-low rounded-[24px] flex items-center justify-center text-5xl group-hover:scale-110 transition-transform duration-500 overflow-hidden relative">
                                <div class="absolute inset-0 flex items-center justify-center opacity-20">
                                    ${icon}
                                </div>
                                ${(product.image_url || product.image) ? `<img src="${product.image_url || product.image}" class="w-full h-full object-cover relative z-10 group-hover:scale-105 transition-transform duration-500" alt="${product.name}">` : ''}
                            </div>

                            <!-- Add to Cart Badge -->
                            <button onclick="event.stopPropagation(); window.addToCart(${product.id})" 
                                    class="absolute top-6 right-6 w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center text-primary border border-outline-variant/10 hover:bg-primary hover:text-white transition-all scale-0 group-hover:scale-100 duration-300 z-20">
                                <span class="material-symbols-outlined text-sm font-bold">add_shopping_cart</span>
                            </button>

                            <div class="mt-6 space-y-3 px-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-bold text-primary uppercase tracking-[0.2em] bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
                                        ${product.category_name || 'Harvest'}
                                    </span>
                                    <span class="text-[10px] font-bold ${isInStock ? 'text-zinc-500' : 'text-error'}">
                                        ${isInStock ? 'In Stock' : 'Sold Out'}
                                    </span>
                                </div>
                                
                                <h3 class="font-headline font-extrabold text-on-background line-clamp-1 group-hover:text-primary transition-colors">${product.name}</h3>
                                
                                ${product.reviews && product.reviews.length > 0 ? `
                                    <div class="flex items-center gap-1 mt-1">
                                        <span class="material-symbols-outlined text-[10px] text-amber-400" style="font-variation-settings: 'FILL' 1;">star</span>
                                        <span class="text-[10px] font-bold text-on-surface-variant">${(product.reviews.reduce((sum, r) => sum + r.rating, 0) / product.reviews.length).toFixed(1)}</span>
                                        <span class="text-[9px] font-medium text-outline">(${product.reviews.length})</span>
                                    </div>
                                ` : `
                                    <div class="flex items-center gap-1 mt-1">
                                        <span class="material-symbols-outlined text-[10px] text-zinc-300">star</span>
                                        <span class="text-[9px] font-medium text-outline">No reviews</span>
                                    </div>
                                `}
                                
                                <div class="flex items-end justify-between pt-2">
                                    <div>
                                        <p class="text-[9px] font-bold text-outline uppercase tracking-widest mb-1">Origin</p>
                                        <p class="text-[10px] font-bold text-on-surface-variant truncate w-24">${product.producer_name}</p>
                                    </div>
                                    <div class="text-right">
                                        ${product.is_surplus && product.discount_price ? `
                                            <p class="text-xs font-bold text-outline line-through">$${product.price}</p>
                                            <p class="text-xl font-black text-emerald-600">$${product.discount_price}</p>
                                        ` : `
                                            <p class="text-xl font-black text-on-background">$${product.price}</p>
                                        `}
                                        <p class="text-[10px] font-bold text-outline-variant uppercase">/${product.unit || 'ea'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        contentEl.innerHTML = html;
        
    } catch (error) {
        console.error('Search error:', error);
        contentEl.innerHTML = `
            <div class="flex flex-col items-center justify-center py-24 text-center text-error">
                <span class="material-symbols-outlined text-4xl mb-4">report</span>
                <p class="font-bold uppercase text-xs tracking-widest">Local sync failed: ${error.message}</p>
            </div>
        `;
    }
});
</script>
{% endblock %}
