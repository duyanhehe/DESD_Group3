{% extends "base.html" %}

{% block title %}Search Results - Food Network{% endblock %}

{% block content %}
<div class="container" style="padding-top: 2rem;">
    <div class="section-header">
        <h1 id="search-title">Search Results</h1>
    </div>
    
    <div id="search-results-content" class="product-grid" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 1rem;">
        <div class="loading-spinner">Searching...</div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const query = urlParams.get('q');
    const titleEl = document.getElementById('search-title');
    const contentEl = document.getElementById('search-results-content');
    
    if (!query) {
        titleEl.textContent = 'Search Results';
        contentEl.innerHTML = '<div class="no-results"><p>Please enter a search term in the search bar above.</p></div>';
        return;
    }
    
    titleEl.textContent = `Search Results for "${query}"`;
    
    try {
        const response = await fetch(`/products/api/v1/search/?q=${encodeURIComponent(query)}`);
        if (!response.ok) throw new Error('Failed to fetch search results');
        
        const data = await response.json();
        const results = data.results || [];
        
        if (results.length === 0) {
            contentEl.innerHTML = '<div class="no-results" style="width: 100%; text-align: center; padding: 40px; color: var(--text-secondary);"><p>No products found matching your criteria.</p></div>';
            return;
        }

        const categoryIcons = {
            'Fruits': '🍎',
            'Vegetables': '🥕',
            'Dairy': '🥛',
            'Bakery': '🍞',
            'Meat': '🥩',
            'Seafood': '🐟',
            'Drinks': '🥤',
            'None': '🛒'
        };

        contentEl.innerHTML = results.map(product => {
            const icon = categoryIcons[product.category_name] || '🛒';
            const statusBadge = product.stock_quantity > 0 
                ? '<span class="badge in-stock" style="background-color: var(--primary-light); color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; display: inline-block;">In Stock</span>' 
                : '<span class="badge out-of-stock" style="background-color: #fce8e8; color: #e53e3e; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; display: inline-block;">Out of Stock</span>';
            
            return `
                <div class="product-card" onclick="window.location.href='/products/${product.id}/'" style="cursor: pointer; position: relative;">
                    <div class="card-add-btn" onclick="event.stopPropagation(); addToCart(${product.id})">+</div>
                    <div class="card-image-box">${icon}</div>
                    <div class="card-info">
                        ${statusBadge}
                        <div class="card-price">
                            $${product.price}
                            <span class="unit">/ ${product.unit || 'item'}</span>
                        </div>
                        <div class="card-title">${product.name}</div>
                        <div class="card-producer">Farm: ${product.producer_name}</div>
                        <div class="card-category" style="font-size: 12px; color: var(--text-secondary);">Category: ${product.category_name || 'Uncategorized'}</div>
                    </div>
                </div>
            `;
        }).join('');
        
    } catch (error) {
        console.error('Error fetching search results:', error);
        contentEl.innerHTML = `<div class="error" style="width: 100%; padding: 40px; text-align: center;"><h3>Oops!</h3><p>${error.message}</p></div>`;
    }
});

function addToCart(productId) {
    fetch('/orders/api/v1/cart/add/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ product_id: productId, quantity: 1 })
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert('Added to cart!');
            // Here you could update the navbar cart badge
        }
    })
    .catch(err => {
        alert('You must be logged in to add to cart.');
    });
}
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
