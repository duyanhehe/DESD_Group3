{% extends "base.html" %}
{% load static %}

{% block title %}Product Details - Food Network{% endblock %}

{% block content %}
<div class="max-w-screen-xl mx-auto px-6 py-12 lg:py-20">
    <!-- Back navigation -->
    <div class="mb-10">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-bold text-on-surface-variant hover:text-primary transition-colors group">
            <span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
            Back to Marketplace
        </a>
    </div>

    <div id="product-detail-content">
        <!-- Skeleton Loader -->
        <div class="grid lg:grid-cols-2 gap-16 animate-pulse">
            <div class="aspect-square bg-surface-container-low rounded-[32px]"></div>
            <div class="space-y-6 py-4">
                <div class="h-4 bg-surface-container-high rounded-full w-32"></div>
                <div class="h-12 bg-surface-container-high rounded-2xl w-3/4"></div>
                <div class="h-8 bg-surface-container-high rounded-2xl w-1/3"></div>
                <div class="h-14 bg-surface-container-high rounded-full w-full mt-8"></div>
            </div>
        </div>
    </div>

    <!-- Frequently Bought Together section -->
    <div id="related-products" class="mt-20 pt-20 border-t border-outline-variant/10 hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Loaded via product_detail.js -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const PRODUCT_ID = "{{ product_id }}";
</script>
<script src="{% static 'js/product_detail.js' %}?v={% now 'U' %}"></script>
{% endblock %}
