$kind: http-request
name: 'Get Profile - Unauthenticated'
method: GET
url: '{{base_url}}/api/v1/accounts/profile/'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 401 or 403 for unauthenticated request", function () {
        pm.expect(pm.response.code).to.be.oneOf([401, 403]);
      });
